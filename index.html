<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Pflegebericht — Spracheingabe</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --siri-blue: #5fc3f5;
            --siri-purple: #a78bfa;
            --siri-pink: #f472b6;
            --siri-orange: #fb923c;
            --siri-green: #34d399;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-bg-hover: rgba(255, 255, 255, 0.12);
            --text-primary: #f5f5f7;
            --text-secondary: rgba(255, 255, 255, 0.55);
            --text-tertiary: rgba(255, 255, 255, 0.35);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
            background: #000;
            color: var(--text-primary);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .bg-gradient {
            position: fixed; inset: 0; z-index: 0; overflow: hidden;
        }
        .bg-gradient::before, .bg-gradient::after {
            content: ''; position: absolute; border-radius: 50%;
            filter: blur(100px); opacity: 0.25;
            animation: bgFloat 12s ease-in-out infinite alternate;
            will-change: transform;
        }
        .bg-gradient::before {
            width: 420px; height: 420px;
            background: radial-gradient(circle, var(--siri-purple), var(--siri-blue));
            top: -120px; left: -80px;
        }
        .bg-gradient::after {
            width: 360px; height: 360px;
            background: radial-gradient(circle, var(--siri-pink), var(--siri-orange));
            bottom: -80px; right: -60px; animation-delay: -6s;
        }
        body.recording .bg-gradient::before,
        body.recording .bg-gradient::after { opacity: 0.55; filter: blur(80px); }

        @keyframes bgFloat {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 20px) scale(1.12); }
        }

        .container {
            position: relative; z-index: 1; width: 100%; max-width: 480px;
            padding: 20px 20px env(safe-area-inset-bottom, 32px);
            display: flex; flex-direction: column; align-items: center; gap: 18px;
        }

        /* ── API Key ── */
        .api-key-wrap { width: 100%; position: relative; }
        .api-key-wrap input {
            width: 100%; padding: 12px 16px 12px 38px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 14px; color: var(--text-primary);
            font-size: 16px; font-family: inherit; outline: none;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            transition: border-color 0.3s, background 0.3s;
        }
        .api-key-wrap input:focus { border-color: rgba(95,195,245,0.4); background: rgba(255,255,255,0.1); }
        .api-key-wrap input::placeholder { color: var(--text-tertiary); }
        .api-key-wrap .key-icon {
            position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
            font-size: 15px; opacity: 0.35; pointer-events: none;
        }

        /* ── Orb ── */
        .orb-section { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 6px 0; }
        .orb-wrap {
            position: relative; width: 110px; height: 110px;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .orb-glow {
            position: absolute; inset: -24px; border-radius: 50%;
            background: conic-gradient(from 0deg, var(--siri-blue), var(--siri-purple), var(--siri-pink), var(--siri-orange), var(--siri-blue));
            filter: blur(32px); opacity: 0; transition: opacity 0.6s;
            animation: orbSpin 4s linear infinite; will-change: transform;
        }
        body.recording .orb-glow { opacity: 0.7; }
        @keyframes orbSpin { to { transform: rotate(360deg); } }
        .orb {
            position: absolute; inset: 0; border-radius: 50%;
            background: conic-gradient(from 0deg, var(--siri-blue), var(--siri-purple), var(--siri-pink), var(--siri-orange), var(--siri-blue));
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s, box-shadow 0.4s;
            animation: orbSpin 6s linear infinite;
            box-shadow: 0 4px 30px rgba(0,0,0,0.4);
        }
        .orb:active { transform: scale(0.93); }
        body.recording .orb { animation: orbSpin 3s linear infinite; box-shadow: 0 0 40px rgba(167,139,250,0.3); }
        .orb-inner {
            width: 90px; height: 90px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #1a1a2e, #0a0a14);
            display: flex; align-items: center; justify-content: center;
        }
        .mic-icon { font-size: 34px; filter: drop-shadow(0 0 8px rgba(95,195,245,0.3)); }
        body.recording .mic-icon { animation: micPulse 1.2s ease-in-out infinite; }
        @keyframes micPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12);opacity:0.8} }
        .orb-label { font-size: 15px; font-weight: 500; color: var(--text-secondary); transition: color 0.3s; }
        body.recording .orb-label { color: var(--siri-blue); }

        /* ── Waveform ── */
        .waveform { display: flex; align-items: center; gap: 3px; height: 24px; opacity: 0; transition: opacity 0.3s; }
        body.recording .waveform { opacity: 1; }
        .waveform .bar { width: 3px; height: 8px; border-radius: 2px; animation: wave 0.8s ease-in-out infinite; }
        .waveform .bar:nth-child(1) { animation-delay:0s;    background:var(--siri-blue); }
        .waveform .bar:nth-child(2) { animation-delay:0.1s;  background:var(--siri-purple); }
        .waveform .bar:nth-child(3) { animation-delay:0.2s;  background:var(--siri-pink); }
        .waveform .bar:nth-child(4) { animation-delay:0.3s;  background:var(--siri-orange); }
        .waveform .bar:nth-child(5) { animation-delay:0.15s; background:var(--siri-purple); }
        .waveform .bar:nth-child(6) { animation-delay:0.25s; background:var(--siri-blue); }
        .waveform .bar:nth-child(7) { animation-delay:0.05s; background:var(--siri-pink); }
        @keyframes wave { 0%,100%{height:6px;opacity:0.5} 50%{height:22px;opacity:1} }

        /* ── Glass Cards ── */
        .card {
            width: 100%; background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 20px;
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        }
        .card-title {
            font-size: 12px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; color: var(--text-tertiary); margin-bottom: 14px;
        }

        /* ── Fields ── */
        .fields-stack { display: flex; flex-direction: column; gap: 12px; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-size: 12px; font-weight: 500; color: var(--text-secondary); padding-left: 2px; }
        .field input, .field textarea {
            width: 100%; padding: 12px 14px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; color: var(--text-primary);
            font-size: 16px; font-family: inherit; outline: none;
            transition: border-color 0.3s, background 0.3s;
        }
        .field input:focus, .field textarea:focus {
            border-color: rgba(95,195,245,0.3); background: rgba(255,255,255,0.08);
        }
        .field input::placeholder, .field textarea::placeholder { color: var(--text-tertiary); font-size: 14px; }
        .field textarea { resize: none; min-height: 64px; line-height: 1.5; }
        .field input.loading, .field textarea.loading {
            color: var(--text-tertiary); animation: shimmer 1.5s ease-in-out infinite;
        }
        @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:0.35} }

        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* ── Textarea full text ── */
        .textarea-wrap textarea {
            width: 100%; padding: 14px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; color: var(--text-primary);
            font-size: 16px; font-family: inherit; line-height: 1.6;
            outline: none; resize: none; min-height: 100px;
            transition: border-color 0.3s;
        }
        .textarea-wrap textarea:focus { border-color: rgba(95,195,245,0.3); }
        .textarea-wrap textarea::placeholder { color: var(--text-tertiary); font-size: 14px; }
        body.recording .textarea-wrap textarea { border-color: rgba(95,195,245,0.2); }

        /* ── Status ── */
        .status { text-align: center; font-size: 13px; color: var(--text-tertiary); min-height: 20px; }
        .status.analyzing { color: var(--siri-blue); font-weight: 500; }
        .status.error { color: var(--siri-pink); }
        .status.success { color: var(--siri-green); }

        /* ── Buttons ── */
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .actions button {
            padding: 14px 16px; background: var(--glass-bg);
            border: 1px solid var(--glass-border); border-radius: 14px;
            color: var(--text-secondary); font-size: 14px; font-weight: 500;
            font-family: inherit; cursor: pointer; min-height: 48px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            transition: all 0.2s; -webkit-tap-highlight-color: transparent;
        }
        .actions button:hover { background: var(--glass-bg-hover); color: var(--text-primary); }
        .actions button:active { transform: scale(0.97); }
        .actions button:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        .btn-save {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(95,195,245,0.2), rgba(167,139,250,0.2)) !important;
            border-color: rgba(95,195,245,0.25) !important;
            color: var(--siri-blue) !important; font-size: 16px !important;
            font-weight: 600 !important;
        }
        .btn-save:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(95,195,245,0.3), rgba(167,139,250,0.3)) !important;
            color: #fff !important;
        }
        .btn-save.saved {
            background: linear-gradient(135deg, rgba(52,211,153,0.2), rgba(52,211,153,0.15)) !important;
            border-color: rgba(52,211,153,0.3) !important; color: var(--siri-green) !important;
        }

        /* ── Firebase status ── */
        .fb-status { width:100%; text-align:center; font-size:12px; padding:8px 14px; border-radius:10px; display:none; }
        .fb-status.connected { display:block; background:rgba(52,211,153,0.1); border:1px solid rgba(52,211,153,0.2); color:var(--siri-green); }
        .fb-status.disconnected { display:block; background:rgba(244,114,182,0.1); border:1px solid rgba(244,114,182,0.2); color:var(--siri-pink); }

        /* ── Historie ── */
        .historie-section { width: 100%; }
        .historie-section .card-title { margin-bottom: 12px; }
        .historie-list { display: flex; flex-direction: column; gap: 12px; }
        .historie-empty {
            text-align: center; padding: 24px 16px;
            color: var(--text-tertiary); font-size: 14px;
        }
        .historie-card {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; padding: 16px; transition: background 0.2s;
        }
        .historie-card:hover { background: rgba(255,255,255,0.07); }
        .historie-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px;
        }
        .historie-name { font-size: 16px; font-weight: 600; color: var(--text-primary); }
        .historie-date { font-size: 11px; color: var(--text-tertiary); }
        .historie-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
        .historie-tag {
            font-size: 11px; padding: 4px 10px; border-radius: 8px;
            font-weight: 500; white-space: nowrap;
        }
        .tag-risiko { background: rgba(244,114,182,0.15); color: var(--siri-pink); }
        .tag-massnahme { background: rgba(95,195,245,0.15); color: var(--siri-blue); }
        .historie-situation {
            font-size: 13px; color: var(--text-secondary); line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }
        .historie-card.expanded .historie-situation {
            -webkit-line-clamp: unset;
        }
        .historie-toggle {
            display: inline-block; margin-top: 6px; font-size: 12px;
            color: var(--siri-blue); cursor: pointer; border: none;
            background: none; font-family: inherit; padding: 0;
        }
        .historie-delete {
            font-size: 11px; color: var(--text-tertiary); cursor: pointer;
            background: none; border: none; padding: 4px 8px; border-radius: 6px;
            font-family: inherit; transition: all 0.2s;
        }
        .historie-delete:hover { background: rgba(244,114,182,0.15); color: var(--siri-pink); }

        /* ── Privacy ── */
        .privacy {
            font-size: 11px; color: var(--text-tertiary); text-align: center;
            line-height: 1.5; max-width: 320px;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .container { padding: 16px 16px 24px; gap: 14px; }
            .orb-wrap { width: 96px; height: 96px; }
            .orb-inner { width: 78px; height: 78px; }
            .mic-icon { font-size: 28px; }
            .card { padding: 16px; border-radius: 16px; }
            .field-row { grid-template-columns: 1fr; }
        }
        @media (min-width: 481px) { .container { padding-top: 32px; } }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <div class="container">

        <div class="api-key-wrap">
            <span class="key-icon">🔑</span>
            <input type="password" id="apiKey" placeholder="OpenAI API-Key eingeben" autocomplete="off">
        </div>

        <div class="fb-status" id="fbStatus"></div>

        <!-- Orb -->
        <div class="orb-section">
            <div class="orb-wrap" id="orbBtn" role="button" tabindex="0" aria-label="Aufnahme starten" aria-pressed="false">
                <div class="orb-glow"></div>
                <div class="orb"><div class="orb-inner"><span class="mic-icon">🎙️</span></div></div>
            </div>
            <div class="waveform">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
            <span class="orb-label" id="orbLabel">Antippen zum Sprechen</span>
        </div>

        <!-- Pflegebericht-Felder -->
        <div class="card">
            <div class="card-title">Pflegebericht</div>
            <div class="fields-stack">
                <div class="field">
                    <label for="fieldBewohner">Bewohner / Kürzel</label>
                    <input type="text" id="fieldBewohner" placeholder="z.B. Müller, H.">
                </div>
                <div class="field">
                    <label for="fieldSituation">Aktuelle Situation / Befinden</label>
                    <textarea id="fieldSituation" rows="2" placeholder="Was ist passiert? Aktueller Zustand …"></textarea>
                </div>
                <div class="field">
                    <label for="fieldRisiken">Beobachtete Risiken</label>
                    <textarea id="fieldRisiken" rows="2" placeholder="z.B. Dekubitusrisiko, Sturzgefahr …"></textarea>
                </div>
                <div class="field">
                    <label for="fieldMassnahmen">Durchgeführte Maßnahmen</label>
                    <textarea id="fieldMassnahmen" rows="2" placeholder="z.B. Lagerung, Vitalzeichenkontrolle …"></textarea>
                </div>
            </div>
        </div>

        <!-- Gesamter Text -->
        <div class="card">
            <div class="card-title">Gesamter erkannter Text</div>
            <div class="textarea-wrap">
                <textarea id="fieldText" placeholder="Hier erscheint der gesprochene Text …" rows="4"></textarea>
            </div>
        </div>

        <div class="status" id="status" aria-live="polite"></div>

        <!-- Actions -->
        <div class="actions">
            <button id="btnRetry" onclick="retryExtraction()" disabled>Erneut extrahieren</button>
            <button onclick="clearAll()">Felder leeren</button>
            <button class="btn-save" id="btnSave" onclick="saveToFirebase()" disabled>
                Bericht speichern
            </button>
        </div>

        <!-- Historie -->
        <div class="card historie-section" id="historieSection">
            <div class="card-title">Historie / Gespeicherte Berichte</div>
            <div class="historie-list" id="historieList">
                <div class="historie-empty">Noch keine Berichte gespeichert.</div>
            </div>
        </div>

        <div class="privacy">
            Audio wird extern verarbeitet (Web Speech API).
            Text wird zur Analyse an OpenAI gesendet.
            Berichte werden in Firebase gespeichert.
        </div>
    </div>

    <script>
    /* ═══════════════════════════════════════════════════════════════
       🔥 FIREBASE KONFIGURATION
       ═══════════════════════════════════════════════════════════════ */
    const firebaseConfig = {
        apiKey:            "AIzaSyCYOzDXQc1fAhamPDlrg_0zoClG25TV88k",
        authDomain:        "voice-to-text-70b90.firebaseapp.com",
        projectId:         "voice-to-text-70b90",
        storageBucket:     "voice-to-text-70b90.firebasestorage.app",
        messagingSenderId: "66935850901",
        appId:             "1:66935850901:web:4c2a582a15b00d9f32589c"
    };

    let db = null;
    let firebaseReady = false;

    try {
        if (firebaseConfig.apiKey !== "DEIN_FIREBASE_API_KEY") {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            firebaseReady = true;
            showFbStatus('Firebase verbunden', 'connected');
            loadHistorie();
        } else {
            showFbStatus('Firebase nicht konfiguriert', 'disconnected');
        }
    } catch (e) {
        showFbStatus('Firebase-Fehler: ' + e.message, 'disconnected');
    }

    function showFbStatus(msg, type) {
        const el = document.getElementById('fbStatus');
        el.textContent = msg;
        el.className = 'fb-status ' + type;
    }

    // ── State ──
    let recognition = null;
    let isRecordingIntended = false;
    let finalTranscript = '';
    let restartCount = 0;
    let lastRestartTime = 0;

    // ── DOM ──
    const orbBtn   = document.getElementById('orbBtn');
    const orbLabel = document.getElementById('orbLabel');
    const statusEl = document.getElementById('status');
    const textArea = document.getElementById('fieldText');
    const btnRetry = document.getElementById('btnRetry');
    const btnSave  = document.getElementById('btnSave');
    const fieldIds = ['fieldBewohner', 'fieldSituation', 'fieldRisiken', 'fieldMassnahmen'];

    // ── Events ──
    orbBtn.addEventListener('click', toggleRecording);
    orbBtn.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleRecording(); }
    });
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && isRecordingIntended) stopRecording();
    });
    fieldIds.forEach(id => document.getElementById(id).addEventListener('input', updateSaveButton));

    function updateSaveButton() {
        const hasData = fieldIds.some(id => document.getElementById(id).value.trim());
        btnSave.disabled = !hasData || !firebaseReady;
    }

    // ── Recording ──
    function toggleRecording() {
        isRecordingIntended ? stopRecording() : startRecording();
    }

    function startRecording() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { showStatus('Bitte Chrome oder Edge verwenden.', 'error'); return; }

        finalTranscript = '';
        textArea.value = '';
        clearFields();
        restartCount = 0;

        recognition = new SR();
        recognition.lang = 'de-DE';
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;
        recognition.onresult = handleResult;
        recognition.onerror = handleError;
        recognition.onend = handleEnd;
        recognition.start();
        isRecordingIntended = true;

        document.body.classList.add('recording');
        orbBtn.setAttribute('aria-pressed', 'true');
        orbLabel.textContent = 'Zuhören …';
        showStatus('');
    }

    function stopRecording() {
        isRecordingIntended = false;
        if (recognition) { recognition.onend = null; recognition.onerror = null; recognition.stop(); recognition = null; }
        document.body.classList.remove('recording');
        orbBtn.setAttribute('aria-pressed', 'false');
        orbLabel.textContent = 'Antippen zum Sprechen';

        const text = textArea.value.trim();
        if (text) { finalTranscript = text; btnRetry.disabled = false; analyzeWithOpenAI(text); }
        else { showStatus('Kein Text erkannt.', 'error'); }
    }

    function handleResult(event) {
        let interim = '', accumulated = '';
        for (let i = 0; i < event.results.length; i++) {
            const t = event.results[i][0].transcript;
            if (event.results[i].isFinal) accumulated += t + ' ';
            else interim += t;
        }
        if (accumulated) finalTranscript = accumulated;
        textArea.value = (finalTranscript + interim).trim();
        textArea.scrollTop = textArea.scrollHeight;
    }

    function handleError(event) {
        if (['no-speech', 'aborted'].includes(event.error)) return;
        const m = { 'not-allowed':'Mikrofonzugriff verweigert.', 'audio-capture':'Kein Mikrofon gefunden.', 'network':'Netzwerkfehler.', 'service-not-allowed':'Dienst nicht verfügbar.' };
        showStatus(m[event.error] || 'Fehler: ' + event.error, 'error');
    }

    function handleEnd() {
        if (!isRecordingIntended) return;
        const now = Date.now();
        restartCount = (now - lastRestartTime < 10000) ? restartCount + 1 : 1;
        lastRestartTime = now;
        if (restartCount > 5) { showStatus('Spracherkennung abgebrochen.', 'error'); stopRecording(); return; }
        setTimeout(() => {
            if (isRecordingIntended && recognition) { try { recognition.start(); } catch (_) {} }
        }, 300);
    }

    // ── OpenAI Extraction ──
    async function analyzeWithOpenAI(text) {
        const apiKey = document.getElementById('apiKey').value.trim();
        if (!apiKey) { showStatus('Bitte OpenAI API-Key eingeben.', 'error'); return; }

        showStatus('Pflegebericht wird analysiert …', 'analyzing');
        setFieldsLoading(true);

        const systemPrompt = `Du bist ein erfahrener Pflegeexperte und Datenextraktions-Assistent für die ambulante und stationäre Pflege. Du kennst die Strukturierte Informationssammlung (SIS) und die Pflegedokumentation nach den 6 Themenbereichen.

Analysiere den folgenden transkribierten Sprachtext einer Pflegekraft und extrahiere strukturierte Daten für einen Pflegebericht.

Extrahiere diese Felder:

1. bewohner – Name oder Kürzel des Bewohners/Patienten. Korrigiere offensichtliche Transkriptionsfehler bei Namen.

2. situation – Aktuelle Situation und Befinden. Fasse zusammen: Was ist passiert? Wie geht es dem Bewohner? Beziehe dich auf die SIS-Themenbereiche (Kognition, Mobilität, Körperpflege, Ernährung, Kontinenz, soziale Teilhabe). Formuliere in knappen, professionellen Sätzen.

3. risiken – Beobachtete oder relevante Risiken. Erkenne aus dem Text pflegerelevante Risiken wie:
   - Dekubitusrisiko (Druckgeschwüre, Hautrötungen, Immobilität)
   - Sturzrisiko (Gangunsicherheit, Schwindel, Stolpern)
   - Kontrakturrisiko (Bewegungseinschränkungen)
   - Dehydrationsrisiko (wenig getrunken, trockene Schleimhäute)
   - Mangelernährung (wenig gegessen, Gewichtsverlust)
   - Pneumonierisiko (flache Atmung, Immobilität)
   - Inkontinenz
   - Verwirrtheit / Desorientierung
   - Schmerzen
   Gib nur tatsächlich im Text genannte oder klar ableitbare Risiken an. Formatiere als kommagetrennte Liste.

4. massnahmen – Durchgeführte oder geplante Maßnahmen. Erkenne pflegerische Interventionen wie:
   - Lagerung / Positionswechsel / Mobilisation
   - Vitalzeichenkontrolle (Blutdruck, Puls, Temperatur, Blutzucker)
   - Medikamentengabe
   - Wundversorgung / Verbandswechsel
   - Körperpflege / Hautpflege
   - Ernährung / Flüssigkeitszufuhr sichergestellt
   - Sturzprophylaxe / Hilfsmittel bereitgestellt
   - Arzt informiert / Angehörige informiert
   - Beobachtung / Überwachung
   Formuliere als kommagetrennte Liste konkreter Maßnahmen.

- Der Text stammt aus automatischer Spracherkennung und enthält möglicherweise Fehler. Interpretiere wohlwollend.
- Verwende professionelle Pflegeterminologie.

        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 30000);

        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                body: JSON.stringify({
                    model: 'gpt-4o-mini',
                    messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: text }
                    ],
                    temperature: 0.1,
                    response_format: {
                        type: 'json_schema',
                        json_schema: {
                            name: 'pflegebericht',
                            strict: true,
                            schema: {
                                type: 'object',
                                properties: {
                                    bewohner:   { type: 'string' },
                                    situation:  { type: 'string' },
                                    risiken:    { type: 'string' },
                                    massnahmen: { type: 'string' }
                                },
                                required: ['bewohner', 'situation', 'risiken', 'massnahmen'],
                                additionalProperties: false
                            }
                        }
                    }
                }),
                signal: controller.signal
            });
            clearTimeout(timeout);

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                const m = { 401:'Ungültiger API-Key.', 429:'Zu viele Anfragen.', 500:'OpenAI nicht erreichbar.', 502:'OpenAI nicht erreichbar.', 503:'OpenAI nicht erreichbar.' };
                throw new Error(m[response.status] || err.error?.message || 'API-Fehler ' + response.status);
            }

            const data = await response.json();
            const parsed = JSON.parse(data.choices[0].message.content.trim());

            document.getElementById('fieldBewohner').value   = parsed.bewohner || '';
            document.getElementById('fieldSituation').value  = parsed.situation || '';
            document.getElementById('fieldRisiken').value    = parsed.risiken || '';
            document.getElementById('fieldMassnahmen').value = parsed.massnahmen || '';

            setFieldsLoading(false);
            updateSaveButton();
            showStatus('Analyse abgeschlossen', 'success');
            setTimeout(() => showStatus(''), 3000);

        } catch (err) {
            clearTimeout(timeout);
            setFieldsLoading(false);
            if (err.name === 'AbortError') showStatus('Zeitüberschreitung.', 'error');
            else if (err.message === 'Failed to fetch') showStatus('Keine Internetverbindung.', 'error');
            else showStatus(err.message, 'error');
        }
    }

    // ── Firebase Save ──
    async function saveToFirebase() {
        if (!db) { showStatus('Firebase nicht konfiguriert.', 'error'); return; }

        const data = {
            bewohner:   document.getElementById('fieldBewohner').value.trim(),
            situation:  document.getElementById('fieldSituation').value.trim(),
            risiken:    document.getElementById('fieldRisiken').value.trim(),
            massnahmen: document.getElementById('fieldMassnahmen').value.trim(),
            text:       textArea.value.trim(),
            timestamp:  firebase.firestore.FieldValue.serverTimestamp()
        };

        btnSave.disabled = true;
        btnSave.textContent = 'Wird gespeichert …';

        try {
            await db.collection('pflegeberichte').add(data);

            btnSave.textContent = 'Gespeichert ✓';
            btnSave.classList.add('saved');
            showStatus('Bericht gespeichert', 'success');
            loadHistorie();

            setTimeout(() => {
                btnSave.textContent = 'Bericht speichern';
                btnSave.classList.remove('saved');
                updateSaveButton();
                showStatus('');
            }, 3000);
        } catch (err) {
            btnSave.disabled = false;
            btnSave.textContent = 'Bericht speichern';
            showStatus('Speichern fehlgeschlagen: ' + err.message, 'error');
        }
    }

    // ── Firebase Load Historie ──
    async function loadHistorie() {
        if (!db) return;
        const list = document.getElementById('historieList');

        try {
            const snap = await db.collection('pflegeberichte').orderBy('timestamp', 'desc').limit(50).get();

            if (snap.empty) {
                list.innerHTML = '<div class="historie-empty">Noch keine Berichte gespeichert.</div>';
                return;
            }

            list.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                const date = d.timestamp ? d.timestamp.toDate() : new Date();
                const card = document.createElement('div');
                card.className = 'historie-card';
                card.dataset.id = doc.id;

                const risiken = d.risiken ? d.risiken.split(',').map(r =>
                    '<span class="historie-tag tag-risiko">' + r.trim() + '</span>'
                ).join('') : '';

                const massnahmen = d.massnahmen ? d.massnahmen.split(',').map(m =>
                    '<span class="historie-tag tag-massnahme">' + m.trim() + '</span>'
                ).join('') : '';

                card.innerHTML =
                    '<div class="historie-header">' +
                        '<span class="historie-name">' + esc(d.bewohner || 'Unbekannt') + '</span>' +
                        '<div style="display:flex;align-items:center;gap:8px">' +
                            '<span class="historie-date">' + formatDate(date) + '</span>' +
                            '<button class="historie-delete" onclick="deleteEntry(\'' + doc.id + '\')" title="Löschen">✕</button>' +
                        '</div>' +
                    '</div>' +
                    (risiken || massnahmen ?
                        '<div class="historie-tags">' + risiken + massnahmen + '</div>' : '') +
                    '<div class="historie-situation">' + esc(d.situation || '') + '</div>' +
                    (d.situation && d.situation.length > 150 ?
                        '<button class="historie-toggle" onclick="toggleExpand(this)">Mehr anzeigen</button>' : '');

                list.appendChild(card);
            });
        } catch (err) {
            list.innerHTML = '<div class="historie-empty">Fehler beim Laden: ' + esc(err.message) + '</div>';
        }
    }

    function toggleExpand(btn) {
        const card = btn.closest('.historie-card');
        card.classList.toggle('expanded');
        btn.textContent = card.classList.contains('expanded') ? 'Weniger' : 'Mehr anzeigen';
    }

    async function deleteEntry(id) {
        if (!db) return;
        try {
            await db.collection('pflegeberichte').doc(id).delete();
            loadHistorie();
            showStatus('Eintrag gelöscht', 'success');
            setTimeout(() => showStatus(''), 2000);
        } catch (err) {
            showStatus('Löschen fehlgeschlagen: ' + err.message, 'error');
        }
    }

    function formatDate(d) {
        const pad = n => String(n).padStart(2, '0');
        return pad(d.getDate()) + '.' + pad(d.getMonth()+1) + '.' + d.getFullYear() +
               ', ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }

    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    // ── Helpers ──
    function retryExtraction() {
        const text = textArea.value.trim();
        if (text) analyzeWithOpenAI(text);
    }

    function clearFields() {
        fieldIds.forEach(id => document.getElementById(id).value = '');
        updateSaveButton();
    }

    function clearAll() {
        clearFields();
        textArea.value = '';
        finalTranscript = '';
        btnRetry.disabled = true;
        btnSave.textContent = 'Bericht speichern';
        btnSave.classList.remove('saved');
        showStatus('');
    }

    function setFieldsLoading(on) {
        fieldIds.forEach(id => {
            const el = document.getElementById(id);
            if (on) { el.value = '…'; el.classList.add('loading'); }
            else { el.classList.remove('loading'); }
        });
    }

    function showStatus(msg, type = '') {
        statusEl.textContent = msg;
        statusEl.className = 'status' + (type ? ' ' + type : '');
    }
